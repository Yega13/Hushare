NEXT_PUBLIC_SITE_URL = "https://hushare.space"
NEXT_PUBLIC_SUPABASE_URL = "https://yqngmyjquwemwogdyuwv.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "sb_publishable_eGkedNMc2vozQFQz__XC5Q_ITLIHjKV"
R2_PUBLIC_HOST = "videos.hushare.space"
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAADDt-NIV2H4_FNKgornAUjbhM0g"
# Set to "true" after verifying hushare.space in Resend dashboard → Domains
