name = "hushare"
main = "worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false

[[routes]]
pattern = "hushare.space/*"
zone_name = "hushare.space"

[[routes]]
pattern = "www.hushare.space/*"
zone_name = "hushare.space"

[triggers]
crons = ["0 2 * * *"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hushare-media"

# Workers Analytics Engine — product event stream (queried via the SQL API / GraphQL).
# Fire-and-forget writes from src/lib/analytics.ts; never on the request's critical path.
# Dataset name matches the one created in the Cloudflare dashboard (case-sensitive).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "Hushare_events"

# Edge-enforced, no-DB-round-trip rate limit for the video-upload relay's PATCH path (src/app/api/
# upload/stream-relay/[uid]/route.ts). A relayed large video is many chunks (~820 for a 4GB video at
# 5MB/chunk) — the Postgres-backed checkRateLimit helper (insert+count+delete per call) would add
# real latency at that frequency, on the very networks already struggling. This binding is an abuse
# backstop only (the uid is already unguessable + existence-checked against our own DB), not a
# precise accounting mechanism — "eventually consistent per Cloudflare location" is fine for that.
[[ratelimits]]
name = "STREAM_RELAY_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 600
  period = 60

