name = "hushare"
main = "worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = false

[[routes]]
pattern = "hushare.space/*"
zone_name = "hushare.space"

[[routes]]
pattern = "www.hushare.space/*"
zone_name = "hushare.space"

[triggers]
crons = ["0 2 * * *"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "hushare-media"

# Workers Analytics Engine — product event stream (queried via the SQL API / GraphQL).
# Fire-and-forget writes from src/lib/analytics.ts; never on the request's critical path.
# DISABLED until Analytics Engine is enabled on the account (Cloudflare Dashboard →
# Workers → Analytics Engine). Deploying with this binding while the feature is off fails
# with error 10089. track() no-ops safely when the ANALYTICS binding is absent, so the app
# works fine meanwhile. Re-enable this block and redeploy once the dashboard toggle is on.
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "hushare_events"

