name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Must be >=22: wrangler, miniflare and @opennextjs require Node 22+.
          # Building on Node 20 produces a subtly broken worker bundle whose app-router
          # page module loses its `handler` export (HTTP 500: ComponentMod.handler is
          # not a function on every route).
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          NEXT_PUBLIC_SITE_URL: "https://hushare.space"
          NEXT_PUBLIC_SUPABASE_URL: "https://yqngmyjquwemwogdyuwv.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_eGkedNMc2vozQFQz__XC5Q_ITLIHjKV"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADDt-NIV2H4_FNKgornAUjbhM0g"

      # Keep the database in sync with the code on every deploy. Applies any new
      # supabase/migrations/*.sql (tracked + idempotent) then verifies no drift.
      # Skips gracefully if SUPABASE_DB_URL isn't set, so it can never block a deploy.
      # Set the secret to the Supabase pooler "session" connection string.
      - name: Apply DB migrations (if configured)
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            npm run db:migrate && npm run db:check
          else
            echo "::warning::SUPABASE_DB_URL secret not set — skipping DB migration + drift check"
          fi
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
