name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Must be >=22: wrangler, miniflare and @opennextjs require Node 22+.
          # Building on Node 20 produces a subtly broken worker bundle whose app-router
          # page module loses its `handler` export (HTTP 500: ComponentMod.handler is
          # not a function on every route).
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          NEXT_PUBLIC_SITE_URL: "https://hushare.space"
          NEXT_PUBLIC_SUPABASE_URL: "https://yqngmyjquwemwogdyuwv.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxbmdteWpxdXdlbXdvZ2R5dXd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODY1ODgsImV4cCI6MjA5NzQ2MjU4OH0.D6r3Qm4ihpzVqrDy8cFWoUyAETKVznA2kQl4cYlp-1k"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAADDt-NIV2H4_FNKgornAUjbhM0g"

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
